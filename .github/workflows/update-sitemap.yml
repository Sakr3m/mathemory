name: Update sitemap

# Si attiva a ogni push su main. Il controllo "git diff --quiet" più sotto
# impedisce un loop infinito: se la sitemap non cambia, non viene fatto
# nessun nuovo commit, quindi non scatta un altro push.
on:
  push:
    branches: [main]

# di default una GitHub Action ha solo il permesso di lettura sulla repo:
# senza questa dichiarazione esplicita, il passo "git push" più sotto fallisce
permissions:
  contents: write

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Rigenera sitemap.xml
        run: python3 scripts/generate_sitemap.py .

      - name: Commit se la sitemap è cambiata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git diff --cached --quiet && echo "Nessuna modifica, niente da committare" || git commit -m "Aggiorna sitemap.xml automaticamente [skip ci]"
          git push
